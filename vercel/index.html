<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="SW6b4qiLVN7V8RoqeG5ynxXW9ysyHhlBnBgHSurKLM4" />
    <title>CHILLGPT EMPIRE</title>
    <meta name="description" content="Play CHILLGPT EMPIRE, the ultimate AI idle clicking adventure!">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #9d00ff;
            --bg-color: #0b0c10;
            --text-color: #ffffff;
            --glass-bg: rgba(11, 12, 16, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        /* Banner Background Image with Overlay */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: blur(4px);
            transform: scale(1.05); /* Prevents blur from creating white edges */
            animation: slowZoom 20s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1.05); }
            100% { transform: scale(1.15); }
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(15, 0, 30, 0.7) 100%);
            z-index: 1;
        }

        /* Subtle grid overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.15;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3.5rem 4rem;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem auto;
            border-radius: 25px;
            object-fit: contain;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.2), 
                        inset 0 0 20px rgba(157, 0, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); box-shadow: 0 15px 50px rgba(0, 255, 204, 0.3), inset 0 0 20px rgba(157, 0, 255, 0.3); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff, #a0aab2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            line-height: 1.1;
        }

        p {
            font-size: 1.15rem;
            color: #d1d5db;
            margin-bottom: 2.5rem;
            font-weight: 300;
            line-height: 1.6;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3.5rem;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--bg-color);
            background: linear-gradient(90deg, var(--primary), #00d4aa);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
            cursor: pointer;
            z-index: 1;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.5s ease;
            z-index: -1;
        }

        .play-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.7);
            background: linear-gradient(90deg, #00d4aa, var(--primary));
        }

        .play-btn:hover::before {
            left: 100%;
        }

        .play-btn:active {
            transform: translateY(1px);
        }

        /* Music Toggle Button */
        .music-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .music-toggle:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        .music-toggle svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .music-playing .play-icon { display: none; }
        .music-playing .pause-icon { display: block; }
        
        .music-paused .play-icon { display: block; }
        .music-paused .pause-icon { display: none; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 2rem; }
            .logo { width: 100px; height: 100px; }
        }

    </style>
</head>
<body>
    <div class="background"></div>
    <div class="background-overlay"></div>
    <div class="grid-overlay"></div>
    
    <audio id="bgm" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <img src="logo.png" alt="ChillGPT Empire Logo" class="logo">
        <h1>CHILLGPT<br>EMPIRE</h1>
        <p>Build the ultimate AI company from your bedroom to global domination. Manage servers, train models, and outcompete your rivals.</p>
        <a href="https://khushalsolanki001.itch.io/chillgpt-empire" class="play-btn">Play Now</a>
    </div>

    <button class="music-toggle music-paused" id="musicBtn" aria-label="Toggle Music">
        <!-- Play Icon -->
        <svg class="play-icon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <!-- Pause Icon -->
        <svg class="pause-icon" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
    </button>

    <script>
        const audio = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        let hasInteracted = false;

        // Try to play audio on any interaction anywhere on the page
        document.body.addEventListener('click', function() {
            if(!hasInteracted) {
                audio.volume = 0.5; // Start at 50% volume
                audio.play().then(() => {
                    musicBtn.classList.remove('music-paused');
                    musicBtn.classList.add('music-playing');
                    hasInteracted = true;
                }).catch(e => console.log("Audio play blocked by browser:", e));
            }
        }, { once: true });

        // Manual music toggle logic
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent triggering the body click
            hasInteracted = true;
            if (audio.paused) {
                audio.volume = 0.5;
                audio.play();
                musicBtn.classList.remove('music-paused');
                musicBtn.classList.add('music-playing');
            } else {
                audio.pause();
                musicBtn.classList.remove('music-playing');
                musicBtn.classList.add('music-paused');
            }
        });
    </script>
</body>
</html>
