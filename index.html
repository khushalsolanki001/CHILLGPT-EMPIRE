<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChillGPT Empire – Build the Chillest AI</title>
  <meta name="description" content="An idle tycoon where you build ChillGPT — the world's chillest AI. Start in a garage in 2016, dominate by 2026." />

  <!-- Pixel / retro fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- All styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Phaser 3 — loaded before game scripts -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
</head>
<body>

<!-- ================================================================
     ROOT APP LAYOUT
================================================================ -->
<div id="app">

  <!-- ── TOP BAR ──────────────────────────────────────────────── -->
  <header id="topbar">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">ChillGPT<br><span class="logo-sub">EMPIRE</span></span>
    </div>

    <div class="stat-pills">
      <!-- Money -->
      <div class="stat-pill money">
        <span class="pill-icon">💰</span>
        <div class="pill-body">
          <div class="pill-label">CASH</div>
          <div class="pill-value" id="stat-money">$0</div>
        </div>
      </div>

      <!-- Compute -->
      <div class="stat-pill compute">
        <span class="pill-icon">🖥️</span>
        <div class="pill-body">
          <div class="pill-label">COMPUTE</div>
          <div class="pill-value" id="stat-compute">0 TF/s</div>
        </div>
      </div>

      <!-- Electricity -->
      <div class="stat-pill electricity" id="elec-pill">
        <span class="pill-icon">⚡</span>
        <div class="pill-body">
          <div class="pill-label">POWER COST</div>
          <div class="pill-value" id="stat-electricity">$0/s</div>
        </div>
      </div>

      <!-- Users -->
      <div class="stat-pill users">
        <span class="pill-icon">👥</span>
        <div class="pill-body">
          <div class="pill-label">USERS</div>
          <div class="pill-value" id="stat-users">0</div>
        </div>
      </div>

      <!-- Workers -->
      <div class="stat-pill workers">
        <span class="pill-icon">👥</span>
        <div class="pill-body">
          <div class="pill-label">STAFF</div>
          <div class="pill-value" id="stat-workers">1 staff</div>
        </div>
      </div>

      <!-- Net income -->
      <div class="stat-pill income">
        <span class="pill-icon">📈</span>
        <div class="pill-body">
          <div class="pill-label">NET/SEC</div>
          <div class="pill-value" id="stat-net">$0/s</div>
      </div>
      <button id="dev-mode-btn" style="background:#39d87e; color:#0c0d13; border:2px solid #000; font-family:inherit; font-size:9px; cursor:pointer; padding:4px 8px; box-shadow:2px 2px 0 #000; margin-left:10px; font-weight:bold;" onclick="UI.activateDevMode()">DEV MODE (+$1M)</button>
      <button id="dev-skip-btn" style="background:#f5c842; color:#0c0d13; border:2px solid #000; font-family:inherit; font-size:9px; cursor:pointer; padding:4px 8px; box-shadow:2px 2px 0 #000; margin-left:5px; font-weight:bold;" onclick="UI.devSkipYear()">SKIP YEAR ⏭</button>
      <button id="dev-t3-btn" style="background:#4287f5; color:#fff; border:2px solid #000; font-family:inherit; font-size:9px; cursor:pointer; padding:4px 8px; box-shadow:2px 2px 0 #000; margin-left:5px; font-weight:bold;" onclick="UI.devSetTier(3)">TEST T3</button>
      <button id="dev-t4-btn" style="background:#9342f5; color:#fff; border:2px solid #000; font-family:inherit; font-size:9px; cursor:pointer; padding:4px 8px; box-shadow:2px 2px 0 #000; margin-left:5px; font-weight:bold;" onclick="UI.devSetTier(4)">TEST T4</button>
      <button id="hard-reset-btn" style="background:#a82020; color:#fff; border:2px solid #000; font-family:inherit; font-size:9px; cursor:pointer; padding:4px 8px; box-shadow:2px 2px 0 #000; margin-left:10px;" onclick="if(confirm('Wipe ALL progress?')) Save.reset()">HARD RESET</button>
    </div>

    <div class="year-badge" id="year-badge">
      <span class="year-label">YEAR</span>
      <span class="year-value" id="year-value">2016</span>
    </div>
  </header>

  <!-- ── FACTORY AREA ──────────────────────────────────────────── -->
  <main id="factory" aria-label="Factory Area">

    <!-- CRT scanline overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Background glow orbs -->
    <div class="glow-orb orb-blue"  aria-hidden="true"></div>
    <div class="glow-orb orb-purple" aria-hidden="true"></div>
    <div class="glow-orb orb-green" aria-hidden="true"></div>

    <!-- Star field -->
    <div id="stars-container" aria-hidden="true"></div>

    <!-- Floor grid -->
    <div class="floor-grid" aria-hidden="true"></div>

    <!-- Location sign (changes each year) -->
    <div class="location-sign" id="location-sign">🏠 GARAGE SETUP</div>

    <!-- Machine display rows -->
    <div id="machines-container" aria-label="Machines">
      <div class="machine-row" id="machine-row-back"></div>
      <div class="machine-row" id="machine-row-front"></div>
    </div>

    <!-- ChillGPT Mascot robot -->
    <div id="mascot" role="button" tabindex="0" aria-label="ChillGPT Mascot – click for a message"
         onclick="UI.mascotSpeak()" onkeydown="if(event.key==='Enter')UI.mascotSpeak()">
      <div id="mascot-body">
        <div class="mascot-antenna"><div class="antenna-tip"></div></div>
        <div class="mascot-head">
          <div class="mascot-visor"></div>
          <div class="mascot-eyes">
            <div class="mascot-eye left-eye"></div>
            <div class="mascot-eye right-eye"></div>
          </div>
          <div class="mascot-mouth" id="mascot-mouth"></div>
        </div>
        <div class="mascot-torso">
          <div class="torso-led led-1"></div>
          <div class="torso-led led-2"></div>
          <div class="torso-led led-3"></div>
        </div>
        <div class="mascot-feet">
          <div class="foot left-foot"></div>
          <div class="foot right-foot"></div>
        </div>
      </div>
      <!-- Speech bubble -->
      <div id="mascot-speech" role="status" aria-live="polite"></div>
    </div>

    <!-- Train / Collect section -->
    <div id="collect-section">
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label">CHILLGPT v1.0 — TRAINING</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="train-progress"></div>
          <div class="progress-percent" id="progress-percent">0%</div>
        </div>
      </div>
      <button id="collect-btn" onclick="Game.collectMoney()" aria-label="Collect accumulated revenue">
        <span class="btn-icon">💰</span>
        <span id="collect-label">COLLECT REVENUE</span>
      </button>
    </div>

    <!-- Floating notifications layer -->
    <div id="notif-layer" aria-hidden="true"></div>

    <!-- Screen flash overlay -->
    <div id="upgrade-flash" aria-hidden="true"></div>
  </main>

  <!-- ── SHOP PANEL ────────────────────────────────────────────── -->
  <aside id="shop" aria-label="Shop Panel">
    <div class="shop-tabs" role="tablist">
      <button class="shop-tab active" id="tab-hardware" role="tab" aria-selected="true"
              onclick="UI.switchTab('hardware')">⚙️ HARDWARE</button>
      <button class="shop-tab" id="tab-staff" role="tab" aria-selected="false"
              onclick="UI.switchTab('staff')">👥 STAFF</button>
      <button class="shop-tab" id="tab-ai" role="tab" aria-selected="false"
              onclick="UI.switchTab('ai')">🧠 AI TECH</button>
    </div>
    <!-- Shop items injected here by ui.js -->
    <div class="shop-content" id="shop-content"></div>
  </aside>

  <!-- ── FOOTER LEADERBOARD ────────────────────────────────────── -->
  <footer id="footer">
    <div class="footer-label">🏆 GLOBAL AI ARENA</div>
    <div class="lb-entries" id="lb-entries"></div>
    <div class="next-comp" id="next-comp">NEXT ARENA: --:--</div>
  </footer>
</div>

<!-- ================================================================
     ARENA MODAL
================================================================ -->
<div class="modal-overlay" id="arena-modal" role="dialog" aria-modal="true" aria-label="Global AI Arena Results">
  <div class="modal-box pixel-border">
    <div class="modal-title">⚔️ GLOBAL AI ARENA</div>
    <div class="modal-subtitle" id="arena-year-label">YEAR 2016 RESULTS</div>
    <table class="arena-table" aria-label="Competition Results">
      <thead>
        <tr>
          <th>RANK</th>
          <th>COMPANY</th>
          <th>SCORE</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="arena-body"></tbody>
    </table>
    <button class="modal-close-btn" id="arena-close-btn" onclick="UI.closeArena()">
      CONTINUE TO <span id="next-year-label">2017</span> →
    </button>
  </div>
</div>

<!-- Year transition overlay -->
<div id="year-transition" aria-live="assertive" aria-label="Year change announcement">
  <div class="year-splash" id="year-splash-num">2017</div>
  <div class="year-splash-sub" id="year-splash-sub">A new year begins...</div>
</div>

<!-- Toast notifications -->
<div id="toast-container" aria-live="polite"></div>

<!-- ================================================================
     SCRIPTS  (order matters — data first, then logic, then UI)
================================================================ -->
<script src="js/upgrades.js"></script>
<script src="js/save.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="js/phaser-scene.js"></script>
</body>
</html>
